AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: Lab 04 – CRUD REST API with API Gateway HTTP API + Lambda + DynamoDB

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 512
    Timeout: 30
    Tracing: Active
    Environment:
      Variables:
        TABLE_NAME: !Ref TodosTable
        LOG_LEVEL: INFO

Resources:
  # ── DynamoDB Table ─────────────────────────────────────────────────────────
  TodosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: todos-lab
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ── HTTP API ────────────────────────────────────────────────────────────────
  TodosApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowOrigins:
          - "*"

  # ── Lambda Function ─────────────────────────────────────────────────────────
  TodosFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: todos-api
      CodeUri: src/todos/
      Handler: app.handler
      Description: CRUD handler for todo items
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TodosTable
      Events:
        ListTodos:
          Type: HttpApi
          Properties:
            ApiId: !Ref TodosApi
            Path: /todos
            Method: GET
        CreateTodo:
          Type: HttpApi
          Properties:
            ApiId: !Ref TodosApi
            Path: /todos
            Method: POST
        GetTodo:
          Type: HttpApi
          Properties:
            ApiId: !Ref TodosApi
            Path: /todos/{id}
            Method: GET
        UpdateTodo:
          Type: HttpApi
          Properties:
            ApiId: !Ref TodosApi
            Path: /todos/{id}
            Method: PUT
        DeleteTodo:
          Type: HttpApi
          Properties:
            ApiId: !Ref TodosApi
            Path: /todos/{id}
            Method: DELETE

Outputs:
  ApiUrl:
    Description: HTTP API endpoint URL
    Value: !Sub https://${TodosApi}.execute-api.${AWS::Region}.amazonaws.com/

  TodosTableName:
    Description: DynamoDB table name
    Value: !Ref TodosTable
