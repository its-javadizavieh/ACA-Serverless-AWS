AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: Lab 06 – DynamoDB Single-Table Design with Streams

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 512
    Timeout: 30
    Tracing: Active
    Environment:
      Variables:
        TABLE_NAME: !Ref OrdersTable
        LOG_LEVEL: INFO

Resources:
  # ── DynamoDB Table ─────────────────────────────────────────────────────────
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: orders-lab
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ── Orders Manager Lambda ──────────────────────────────────────────────────
  OrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: orders-manager
      CodeUri: src/orders/
      Handler: app.handler
      Description: CRUD operations for customers and orders
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable

  # ── Stream Consumer Lambda ─────────────────────────────────────────────────
  StreamConsumerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: orders-stream-consumer
      CodeUri: src/orders/
      Handler: stream_handler.handler
      Description: Processes DynamoDB Stream events
      Events:
        StreamEvent:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt OrdersTable.StreamArn
            StartingPosition: TRIM_HORIZON
            BatchSize: 50
            FunctionResponseTypes:
              - ReportBatchItemFailures

Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref OrdersTable

  TableStreamArn:
    Description: DynamoDB stream ARN
    Value: !GetAtt OrdersTable.StreamArn
